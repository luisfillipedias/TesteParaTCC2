<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&amp;display=swap');
      .gov-blue { fill: #FFFFFF; }
      .gov-green { fill: #FFFFFF; }
      .gov-yellow { fill: #FFFFFF; }
      .texto-regula { font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 38px; fill: #FFFFFF; }
      .texto-sus { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 38px; fill: #FFFFFF; }
    </style>
  </defs>
  <g transform="translate(10, 15)">
    <rect x="0" y="16" width="16" height="16" rx="3" class="gov-yellow" />
    <rect x="18" y="0" width="16" height="16" rx="3" class="gov-green" />
    <rect x="36" y="16" width="16" height="16" rx="3" class="gov-blue" />
    <rect x="18" y="32" width="16" height="16" rx="3" class="gov-blue" />
    <rect x="18" y="16" width="16" height="16" rx="3" class="gov-blue" />
  </g>
  <text x="75" y="50">
    <tspan class="texto-regula">regula</tspan><tspan class="texto-sus">SUS</tspan>
  </text>
</svg>
