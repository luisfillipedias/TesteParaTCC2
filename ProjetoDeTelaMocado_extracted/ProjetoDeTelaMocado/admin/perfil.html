<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Admin — RegulaSUS</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-required-role="admin">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></div><div class="brand-text">Regula<span>SUS</span></div></div>
    <div class="sidebar-user"><div class="user-avatar">AS</div><div class="user-info"><div class="user-name">Admin Sistema</div><div class="user-role">Administrador</div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Administração</div>
      <a href="usuarios.html"><i class="fa-solid fa-users-gear"></i> Gerenciar Usuários</a>
      <a href="permissoes.html"><i class="fa-solid fa-shield-halved"></i> Permissões</a>
      <a href="sistema.html"><i class="fa-solid fa-server"></i> Sistema</a>
      <div class="nav-section">Logs</div>
      <a href="auditoria.html"><i class="fa-solid fa-clock-rotate-left"></i> Auditoria</a>
    </nav>
    <div class="sidebar-footer"><a href="../login.html"><i class="fa-solid fa-right-from-bracket"></i> Sair</a></div>
  </aside>
  <div class="sidebar-overlay"></div>
  <main class="main-content">
    <header class="top-header">
      <div class="header-left">
        <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        <div class="breadcrumb"><a href="../index.html">RegulaSUS</a><span class="sep">/</span><span class="current">Meu Perfil</span></div>
      </div>
      <div class="header-right">
        <a href="perfil.html" class="header-avatar" title="Meu Perfil">AS</a>
      </div>
    </header>
    <div class="page-content">
      <h1 class="page-title">Meu Perfil</h1>
      <p class="page-subtitle">Informações de acesso administrador.</p>

      <div style="display:grid;grid-template-columns:1fr 2fr;gap:var(--space-6);align-items:start">
        <div class="card animate-fade-in-up">
          <div class="card-body" style="text-align:center;padding:var(--space-8)">
            <div style="width:96px;height:96px;border-radius:var(--radius-full);background:var(--grad-primary);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-4);font-weight:700;font-size:var(--text-3xl)">AS</div>
            <h2 style="font-size:var(--text-xl);margin-bottom:var(--space-1)">Admin Sistema</h2>
            <span class="badge badge-secondary" style="margin-bottom:var(--space-4)">Root</span>
          </div>
        </div>
        <div class="card animate-fade-in-up delay-1">
          <div class="card-header"><h3><i class="fa-solid fa-user-pen" style="color:var(--clr-primary);margin-right:8px"></i> Credenciais</h3></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group"><label class="form-label">Usuário Mestre</label><input type="text" class="form-control" value="admin_root" readonly></div>
              <div class="form-group"><label class="form-label">Permissões Globais</label><input type="text" class="form-control" value="Todos os módulos" readonly></div>
            </div>
            <div style="display:flex;gap:var(--space-3);justify-content:flex-end;margin-top:var(--space-4)">
              <button class="btn btn-secondary"><i class="fa-solid fa-key"></i> Alterar Senha</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
