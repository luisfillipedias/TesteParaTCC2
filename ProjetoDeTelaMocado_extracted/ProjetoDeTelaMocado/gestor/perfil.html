<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Gestor — RegulaSUS</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></div><div class="brand-text">Regula<span>SUS</span></div></div>
    <div class="sidebar-user"><div class="user-avatar">RM</div><div class="user-info"><div class="user-name">Roberto Mendes</div><div class="user-role">Gestor Municipal</div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Gestão</div>
      <a href="dashboard.html"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
      <a href="fila.html"><i class="fa-solid fa-list-ol"></i> Fila de Procedimentos <span class="nav-badge">156</span></a>
      <a href="transporte.html"><i class="fa-solid fa-ambulance"></i> Transporte</a>
      <div class="nav-section">Relatórios</div>
      <a href="indicadores.html"><i class="fa-solid fa-chart-pie"></i> Indicadores</a>
      <a href="exportar.html"><i class="fa-solid fa-file-export"></i> Exportar Dados</a>
    </nav>
    <div class="sidebar-footer"><a href="../login.html"><i class="fa-solid fa-right-from-bracket"></i> Sair</a></div>
  </aside>
  <div class="sidebar-overlay"></div>
  <main class="main-content">
    <header class="top-header">
      <div class="header-left">
        <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        <div class="breadcrumb"><a href="../index.html">RegulaSUS</a><span class="sep">/</span><span class="current">Meu Perfil</span></div>
      </div>
      <div class="header-right">
        <a href="perfil.html" class="header-avatar" title="Meu Perfil">RM</a>
      </div>
    </header>
    <div class="page-content">
      <h1 class="page-title">Meu Perfil</h1>
      <p class="page-subtitle">Informações de acesso de gestor.</p>

      <div style="display:grid;grid-template-columns:1fr 2fr;gap:var(--space-6);align-items:start">
        <div class="card animate-fade-in-up">
          <div class="card-body" style="text-align:center;padding:var(--space-8)">
            <div style="width:96px;height:96px;border-radius:var(--radius-full);background:var(--grad-primary);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-4);font-weight:700;font-size:var(--text-3xl)">RM</div>
            <h2 style="font-size:var(--text-xl);margin-bottom:var(--space-1)">Roberto Mendes</h2>
            <span class="badge badge-warning" style="margin-bottom:var(--space-4)">Gestor Municipal</span>
          </div>
        </div>
        <div class="card animate-fade-in-up delay-1">
          <div class="card-header"><h3><i class="fa-solid fa-user-pen" style="color:var(--clr-primary);margin-right:8px"></i> Dados Institucionais</h3></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group"><label class="form-label">Nome Completo</label><input type="text" class="form-control" value="Roberto Mendes" readonly></div>
              <div class="form-group"><label class="form-label">CPF</label><input type="text" class="form-control" value="***.***.111-22" readonly></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">E-mail Corporativo</label><input type="email" class="form-control" value="roberto@saude.mg.gov.br" readonly></div>
              <div class="form-group"><label class="form-label">Matrícula</label><input type="text" class="form-control" value="MG-8890" readonly></div>
            </div>
            <div style="display:flex;gap:var(--space-3);justify-content:flex-end;margin-top:var(--space-4)">
              <button class="btn btn-secondary"><i class="fa-solid fa-key"></i> Alterar Senha</button>
              <button class="btn btn-primary"><i class="fa-solid fa-pen"></i> Editar Perfil</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../js/app.js"></script>
</body>
</html>
